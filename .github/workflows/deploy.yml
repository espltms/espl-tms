name: TMS Enterprise Production CI/CD Pipeline

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: tms-backend-prod
  ECR_FRONTEND_REPO: tms-frontend-prod
  ECS_CLUSTER: tms-production-cluster
  ECS_SERVICE_BACKEND: tms-backend-service
  ECS_SERVICE_FRONTEND: tms-frontend-service
  ECS_TD_BACKEND: .github/workflows/td-backend.json
  ECS_TD_FRONTEND: .github/workflows/td-frontend.json

jobs:
  # Job 1: Build, Test and Lint checkups
  audit-and-test:
    name: Core Audits & Tests Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Audit NestJS Backend
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Validate Prisma Client Compilation
        working-directory: ./backend
        run: npx prisma generate

      - name: Compile Backend Production Bundle
        working-directory: ./backend
        run: npm run build

      # Audit Next.js Frontend
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Compile Frontend Production Bundle
        working-directory: ./frontend
        run: npm run build

