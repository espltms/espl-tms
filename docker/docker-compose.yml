version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: tms_db
    restart: always
    environment:
      POSTGRES_USER: tms_admin
      POSTGRES_PASSWORD: SecretTmsPassword2026!
      POSTGRES_DB: tms_enterprise
    ports:
      - "5432:5432"
    volumes:
      - tms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_admin -d tms_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tms_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - tms_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: backend.Dockerfile
    container_name: tms_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://tms_admin:SecretTmsPassword2026!@postgres:5432/tms_enterprise?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ProductionEnterpriseSuperSecretJWTKey2026!!
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: frontend.Dockerfile
    container_name: tms_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  tms_postgres_data:
  tms_redis_data:
